<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mario Style Game Pro UI</title>
<style>
  body { margin:0; overflow:hidden; background:#87CEEB; font-family:Arial; }
  canvas { display:block; margin:0 auto; }

  #ui {
    position:fixed;
    top:0; left:0; right:0; bottom:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,0.6);
    color:white;
    flex-direction:column;
    visibility:hidden;
  }

  #ui h1 { font-size:40px; margin-bottom:20px; }
  #ui button {
    padding:12px 24px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#ffcc00;
  }

  #scoreUI {
    position:fixed;
    top:10px;
    right:20px;
    font-size:20px;
    color:black;
  }
</style>
</head>
<body>
<div id="scoreUI">Score: 0</div>
<div id="ui">
  <h1 id="gameOverText">Chi thất vọng về bạn</h1>
  <button onclick="restartGame()">Play Again</button>
</div>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = 900;
canvas.height = 400;

let gravity = 0.5;
let gameOver = false;

const textures = {};
function loadTexture(name, src){
  const img = new Image();
  img.src = src;
  textures[name] = img;
}
loadTexture("player","player.png");
loadTexture("enemy","enemy.png");
loadTexture("coin","coin.png");

let player = { x:100, y:300, w:50, h:50, dy:0, jumping:false };
let ground = 350;
let enemies = [];
let coins = [];
let score = 0;

const ui = document.getElementById("ui");
const scoreUI = document.getElementById("scoreUI");

// spawn
setInterval(()=>{ if(!gameOver) enemies.push({x:canvas.width,y:310,w:40,h:40}); },2000);
setInterval(()=>{ if(!gameOver) coins.push({x:canvas.width,y:250}); },1500);

// control
document.addEventListener("keydown",e=>{
 if(e.code==="Space" && !player.jumping && !gameOver){
  player.dy=-10; player.jumping=true;
 }
});

function update(){
 if(gameOver) return;

 player.dy+=gravity;
 player.y+=player.dy;

 if(player.y+player.h>ground){
  player.y=ground-player.h;
  player.dy=0;
  player.jumping=false;
 }

 enemies.forEach(e=>e.x-=4);
 coins.forEach(c=>c.x-=4);

 enemies.forEach(e=>{
  if(player.x<e.x+e.w && player.x+player.w>e.x && player.y<e.y+e.h && player.y+player.h>e.y){
    endGame();
  }
 });

 coins = coins.filter(c=>{
  let hit = player.x<c.x+20 && player.x+player.w>c.x && player.y<c.y+20 && player.y+player.h>c.y;
  if(hit) score++;
  return !hit;
 });

 scoreUI.innerText = "Score: " + score;
}

function draw(){
 ctx.clearRect(0,0,canvas.width,canvas.height);

 // Mario style ground (brick pattern)
 for(let i=0;i<canvas.width;i+=40){
  ctx.fillStyle = "#8B4513";
  ctx.fillRect(i, ground, 40, 50);
  ctx.strokeStyle = "#5a2e0c";
  ctx.strokeRect(i, ground, 40, 50);
 }

 // Title text
 ctx.fillStyle = "black";
 ctx.font = "30px Arial";
 ctx.font = "40px Arial";
ctx.fillStyle = "white";
ctx.strokeStyle = "black";
ctx.lineWidth = 4;

// vẽ chữ nằm ngay trên mặt đất
ctx.strokeText("GIẢI CỨU HÀ CHIII", 200, ground - 10);
ctx.fillText("GIẢI CỨU HÀ CHIII", 200, ground - 10);

 // Player
 ctx.drawImage(textures.player, player.x, player.y, player.w, player.h);

 // Enemies
 enemies.forEach(e=>{
  ctx.drawImage(textures.enemy, e.x, e.y, e.w, e.h);
 });

 // Coins
 coins.forEach(c=>{
  ctx.drawImage(textures.coin, c.x, c.y, 20, 20);
 });
}

function endGame(){
 gameOver = true;
 ui.style.visibility = "visible";
 document.getElementById("gameOverText").innerText = "Game Over - Score: " + score;
}

function restartGame(){
 player.x=100; player.y=300; player.dy=0; player.jumping=false;
 enemies=[]; coins=[]; score=0;
 gameOver=false;
 ui.style.visibility="hidden";
}

function loop(){
 update();
 draw();
 requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
